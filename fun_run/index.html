<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fun Run</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0d1b2a; overflow: hidden;
    font-family: "Trebuchet MS", "Comic Sans MS", system-ui, sans-serif;
    touch-action: none; user-select: none;
  }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; box-shadow: 0 0 40px rgba(0,0,0,.6); }
  #overlay {
    position: fixed; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    color: #fff; text-align: center; background: rgba(13,27,42,.82); z-index: 10;
  }
  #overlay h1 { font-size: 11vmin; margin: 0 0 2vmin; text-shadow: 0 4px 0 #000; }
  #overlay p  { font-size: 4.5vmin; margin: 1vmin; }
  #overlay button {
    margin-top: 4vmin; font-size: 6vmin; padding: 2vmin 6vmin;
    border: none; border-radius: 999px; cursor: pointer;
    background: #ffd23f; color: #0d1b2a; font-weight: bold; box-shadow: 0 6px 0 #c9a01f;
  }
  #overlay button:active { transform: translateY(4px); box-shadow: 0 2px 0 #c9a01f; }
  #levelFlash {
    position: fixed; top: 42%; left: 50%; transform: translate(-50%,-50%) scale(0);
    color: #ffd23f; font-size: 13vmin; font-weight: bold;
    text-shadow: 0 5px 0 #000; pointer-events: none; z-index: 9; opacity: 0;
  }
  #levelFlash.show { animation: pop 1.4s ease-out; }
  @keyframes pop {
    0%{transform:translate(-50%,-50%) scale(0);opacity:0}
    20%{transform:translate(-50%,-50%) scale(1.2);opacity:1}
    80%{transform:translate(-50%,-50%) scale(1);opacity:1}
    100%{transform:translate(-50%,-50%) scale(1.4);opacity:0}
  }
  /* The glowing FIRE button (only shows during a power-up, mainly for touchscreens) */
  #fireBtn {
    position: fixed; right: 5vmin; bottom: 7vmin; display: none;
    width: 22vmin; height: 22vmin; max-width: 130px; max-height: 130px;
    border: none; border-radius: 50%; cursor: pointer; z-index: 8;
    background: radial-gradient(circle at 50% 40%, #aef6ff, #00c2dd);
    color: #003844; font-weight: bold; font-size: 5vmin;
    box-shadow: 0 0 24px #00e5ff, 0 6px 0 #008599;
  }
  #fireBtn:active { transform: translateY(4px); box-shadow: 0 0 24px #00e5ff, 0 2px 0 #008599; }
  #muteBtn {
    position: fixed; bottom: 2vmin; left: 2vmin; transform: none;
    width: 9vmin; height: 9vmin; max-width: 42px; max-height: 42px;
    border: none; border-radius: 50%; cursor: pointer; z-index: 11;
    background: rgba(13,27,42,.4); color: #ffd23f; font-size: 4.6vmin; line-height: 1;
    display: flex; align-items: center; justify-content: center; padding: 0; opacity: .55;
  }
  #muteBtn:active { transform: translateY(2px); }
  #bigBtn {
    position: fixed; left: 50%; bottom: 8vmin; transform: translateX(-50%);
    display: none; font-size: 7vmin; padding: 2.2vmin 9vmin;
    border: none; border-radius: 999px; cursor: pointer; z-index: 11;
    background: #ffd23f; color: #0d1b2a; font-weight: bold; box-shadow: 0 7px 0 #c9a01f;
    font-family: inherit; letter-spacing: 1px;
  }
  #bigBtn:active { transform: translateX(-50%) translateY(5px); box-shadow: 0 2px 0 #c9a01f; }
  #credit {
    position: fixed; left: 50%; bottom: 21vmin; transform: translateX(-50%);
    display: none; z-index: 11; color: #ffe87a; font-weight: bold;
    font-size: 3.4vmin; white-space: nowrap; pointer-events: none;
    text-shadow: 0 2px 0 #0d1230, 0 0 6px rgba(0,0,0,.5);
  }
  #hofTitleBtn {
    position: fixed; top: 1.5vmin; right: 2.5vmin;
    width: 11vmin; height: 11vmin; max-width: 52px; max-height: 52px;
    border: none; border-radius: 50%; cursor: pointer; z-index: 11; display: none;
    background: rgba(13,27,42,.55); color: #ffd23f; font-size: 5.5vmin; line-height: 1;
    align-items: center; justify-content: center; padding: 0;
  }
  #nameRow { display: none; flex-direction: column; align-items: center; gap: 1vmin; margin: 1vmin 0; }
  #nameInput {
    font-size: 5vmin; padding: 1.4vmin 3vmin; border-radius: 12px; border: 3px solid #ffd23f;
    width: 62vmin; max-width: 300px; text-align: center; font-family: inherit; outline: none;
  }
  #overlay button.secondary {
    font-size: 4.2vmin; padding: 1.6vmin 5vmin; background: #1fb6c9; color: #042a30; box-shadow: 0 5px 0 #117a8a;
  }
  #overlay button.secondary:active { transform: translateY(3px); box-shadow: 0 2px 0 #117a8a; }
  #ovButtons { display: flex; flex-wrap: wrap; gap: 2vmin; justify-content: center; align-items: center; margin-top: 2vmin; }
  #hofList {
    list-style: none; padding: 0; margin: 2vmin 0; width: 78vmin; max-width: 360px;
    max-height: 46vh; overflow-y: auto;
  }
  #hofList li {
    display: flex; align-items: center; font-size: 3.8vmin; padding: 1.1vmin 2vmin; border-radius: 8px; color: #fff;
  }
  #hofList li:nth-child(odd) { background: rgba(255,255,255,.10); }
  #hofList li .rank { width: 9vmin; color: #ffd23f; font-weight: bold; }
  #hofList li .nm { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 2vmin; }
  #hofList li .sc { color: #ffe87a; font-weight: bold; }
  #hofNote { font-size: 3.4vmin; opacity: .85; margin: 1vmin 4vmin; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="levelFlash"></div>
<button id="fireBtn">FIRE</button>
<button id="muteBtn" aria-label="Toggle sound">🔊</button>
<button id="bigBtn">PLAY</button>
<button id="hofTitleBtn" aria-label="Hall of Fame">🏆</button>
<div id="credit">by Alex and Theo Taschereau</div>
<div id="overlay">
  <h1 id="ovTitle">Fun Run</h1>
  <p id="ovText"></p>
  <div id="nameRow">
    <input id="nameInput" maxlength="14" placeholder="Enter your name" autocomplete="off" />
    <button id="submitBtn" class="secondary">SUBMIT SCORE</button>
  </div>
  <p id="hofNote" style="display:none"></p>
  <ol id="hofList" style="display:none"></ol>
  <div id="ovButtons">
    <button id="ovBtn">PLAY</button>
    <button id="hofBtn" class="secondary">HALL OF FAME</button>
  </div>
</div>

<script>
// =================================================================
//  HALL OF FAME (online)  --  paste your Supabase values below.
//  See the setup steps that came with this file. Leave blank to
//  disable the online board (the game still works fine without it).
// =================================================================
const SUPABASE_URL = 'https://qibxhwvogvxwmonojhjf.supabase.co';   // base URL, no /rest/v1/
const SUPABASE_KEY = 'sb_publishable_W4xxp4fFFvBVrY1lzVCDYA_MzMa8Qm2';   // publishable (public) key
const HOF_LIMIT    = 10;   // how many names the Hall of Fame shows

// =================================================================
//  TUNABLE NUMBERS  --  change these to make the game easier/harder
// =================================================================
const COINS_PER_LEVEL  = 15;     // catch this many coins for the next level
const START_SPEED      = 0.0075; // how fast things rush toward you at level 1
const SPEED_PER_LEVEL  = 0.0009; // extra speed each level...
const MAX_SPEED        = 0.018;  // ...but never faster than this (stays playable)
const START_SPAWN_MS   = 1050;   // ms between new things at level 1
const MIN_SPAWN_MS     = 320;    // fastest spawning allowed (lower = busier high levels)
const SPAWN_SPEEDUP_MS = 55;     // spawn gets this much faster each level
const ROBOT_CHANCE_BASE= 0.45;   // chance a thing is a robot at level 1
const PLAYER_MOVE      = 0.040;  // how fast the runner slides left/right (keyboard)
const HIT_WIDTH        = 0.24;   // how close (across the road) counts as a hit/catch
const START_HEARTS     = 3;
// --- dragon boss settings ---
const DRAGON_CHANCE    = 0.015;  // chance per spawn to summon a dragon (rare event)
const DRAGON_T         = 0.45;   // how far away the dragon hovers
const DRAGON_LIFE_MS   = 9000;   // how long it stays before flying off
const DRAGON_SWAY_AMP  = 0.30;   // how far it drifts across the road
const DRAGON_HEAD_GAP  = 0.5;    // lane spread between the three heads / fireballs
const DRAGON_BREATH_MS = 1300;   // time between fire breaths
const DRAGON_HP        = 12;     // laser hits to defeat the dragon
const FIRE_SPEED       = 0.013;  // how fast fireballs rush toward you
// --- power-up settings ---
const POWER_MS         = 6000;   // how long the laser lasts (ms)
const POWER_CHANCE     = 0.04;   // chance a spawn is a laser power-up
const POWER_SPAWN_MS   = 220;    // robots pour in this fast during a power-up
const POWER_SWARM_COUNT= 3;      // how many robots appear at once during the swarm
// --- big robot (boss) settings ---
const BIGBOT_CHANCE    = 0.07;   // chance of a big robot in normal play
const BIG_HIT_WIDTH    = 0.34;   // big robot is wide -> harder to dodge
const BIG_SWAY_AMP     = 0.5;    // how far it swings across the road
const BIG_SWAY_FREQ    = 9;      // how fast it weaves as it charges in
const BIG_HEALTH       = 3;      // laser hits needed to destroy a big robot
const BIG_SPEED_MULT   = 1.4;    // big robot charges faster than normal stuff
const SWARM_BIG_CHANCE = 0.25;   // chance a swarm robot is a BIG one
const SWARM_COIN_CHANCE= 0.20;   // chance a swarm item is a coin to grab
const SPAWN_JITTER     = 0.45;   // randomness in timing (0 = perfectly even, 0.45 = ±45%)
const BULLET_SPEED     = 0.05;   // how fast your lasers fly toward the horizon
const FIRE_COOLDOWN_MS = 160;    // shortest time between shots
const SHOOT_POINTS     = 15;     // points for blasting a robot
const BULLET_HIT_T     = 0.10;   // laser/robot closeness (depth) to count as a hit
const BULLET_HIT_LANE  = 0.18;   // laser/robot closeness (across the road)
// =================================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ovTitle');
const ovText  = document.getElementById('ovText');
const ovBtn   = document.getElementById('ovBtn');
const hofBtn  = document.getElementById('hofBtn');
const hofTitleBtn = document.getElementById('hofTitleBtn');
const nameRow = document.getElementById('nameRow');
const nameInput = document.getElementById('nameInput');
const submitBtn = document.getElementById('submitBtn');
const hofList = document.getElementById('hofList');
const hofNote = document.getElementById('hofNote');
const fireBtn = document.getElementById('fireBtn');
const levelFlash = document.getElementById('levelFlash');

const ROAD_MAX  = 900;   // max road width (px) — keeps the road from getting too wide on desktop
let W = 480, H = 800;
let centerX = W/2, horizonY = H*0.34, groundY = H*0.99, roadTopHalf = W*0.05, roadBotHalf = W*0.46;
function layout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const aspect = Math.max(0.45, Math.min(2.1, vw / vh));   // fill the screen; clamp so it's never absurdly wide/tall
  H = 800; W = Math.round(H * aspect);                      // keep vertical scale fixed, grow width to fit
  centerX = W/2; horizonY = H*0.34; groundY = H*0.99;
  const roadW = Math.min(W, ROAD_MAX);                     // cap road width; extra desktop width becomes scenery
  roadTopHalf = roadW * 0.05; roadBotHalf = roadW * 0.46;
  canvas.width = W; canvas.height = H;
  let cw = vw, ch = vw / aspect;                            // size on screen, preserving aspect (no stretch)
  if (ch > vh) { ch = vh; cw = vh * aspect; }
  canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
}
addEventListener('resize', layout); layout();

// ---- The perspective ("fake 3D") setup ----
const T_PLAYER    = 0.90;
const NSTRIPES    = 10;
const STRIPE_GAP  = 1 / NSTRIPES;
const SIDE_N      = 7;            // roadside props per side
const SIDE_GAP    = 1 / SIDE_N;   // scroll wraps here for a seamless loop
const SIDE_LANE   = 1.4;          // how far off the road the props sit

function project(t, lane) {
  const tt = t * t;
  const y  = horizonY + (groundY - horizonY) * tt;
  const halfW = roadTopHalf + (roadBotHalf - roadTopHalf) * tt;
  const x  = centerX + lane * halfW;
  const scale = 0.14 + tt * 1.05;
  return { x, y, scale };
}

// ---- Game state ----
let player, items, bullets, particles, hearts, score, level, speed, spawnMs, spawnTimer,
    running, coinsThisLevel, runPhase, stripeScroll, spawnGap, sideScroll, pendingSpawns,
    powerActive, powerTimer, fireCooldown, fireHeld, dragon, hitFlash;
let clock = 0;   // wall-clock ms for background animations
let bestScore = 0;

function reset() {
  player = { lane: 0 };
  items = []; bullets = []; particles = [];
  hearts = START_HEARTS;
  score = 0; level = 1; coinsThisLevel = 0;
  speed = START_SPEED; spawnMs = START_SPAWN_MS; spawnTimer = 0; spawnGap = START_SPAWN_MS;
  runPhase = 0; stripeScroll = 0; sideScroll = 0; running = true; pendingSpawns = [];
  powerActive = false; powerTimer = 0; fireCooldown = 0; fireHeld = false; dragon = null; hitFlash = 0;
  themeBag = [];          // fresh full shuffle each new game -> all themes appear before any repeat
  pickTheme();
}

// ---- Input: keyboard ----
const keys = {};
addEventListener('keydown', e => {
  keys[e.key] = true;
  if (AC && AC.state === 'suspended') AC.resume();
  if (e.key === 'Enter' || e.key === ' ') {
    const typing = document.activeElement && document.activeElement.tagName === 'INPUT';
    if (typing) {
      if (e.key === 'Enter' && overlayView === 'over' && nameRow.style.display !== 'none') { e.preventDefault(); submitBtn.click(); }
      return;                                   // let the field handle the keystroke otherwise
    }
    if (mode === 'title' || mode === 'howto') { e.preventDefault(); advanceMenu(); return; }
    if (overlay.style.display === 'flex') { e.preventDefault(); startGame(); return; }
  }
  if ([' ','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  if (mode === 'play' && running && !e.repeat && ['ArrowLeft','ArrowRight','a','d','A','D'].includes(e.key)) sfxBoing();
});
addEventListener('keyup', e => keys[e.key] = false);

// ---- Input: touch / mouse (slide the runner left & right) ----
let pointerLane = null;
function pointerToLane(evt) {
  const rect = canvas.getBoundingClientRect();
  const src = evt.touches ? evt.touches[0] : evt;
  const x = (src.clientX - rect.left) * (W / rect.width);
  return Math.max(-0.85, Math.min(0.85, (x - centerX) / roadBotHalf));
}
function onPointer(evt) { if (!running) return; evt.preventDefault(); if (AC && AC.state === 'suspended') AC.resume(); pointerLane = pointerToLane(evt); }
canvas.addEventListener('touchstart', onPointer, {passive:false});
canvas.addEventListener('touchmove',  onPointer, {passive:false});
canvas.addEventListener('touchend',   () => pointerLane = null);
canvas.addEventListener('mousedown',  onPointer);
canvas.addEventListener('mousemove',  e => { if (e.buttons) onPointer(e); });
canvas.addEventListener('mouseup',    () => pointerLane = null);

// ---- Input: FIRE button ----
function holdFire(e){ e.preventDefault(); e.stopPropagation(); fireHeld = true; }
function releaseFire(e){ e.preventDefault(); fireHeld = false; }
fireBtn.addEventListener('touchstart', holdFire, {passive:false});
fireBtn.addEventListener('touchend',   releaseFire, {passive:false});
fireBtn.addEventListener('mousedown',  holdFire);
fireBtn.addEventListener('mouseup',    releaseFire);
fireBtn.addEventListener('mouseleave', () => fireHeld = false);

// =================================================================
//  AUDIO  --  Web Audio synth: per-theme music loops + sound effects
//  (all generated in code, so no sound files are needed)
// =================================================================
let AC = null, masterGain, musicGain, sfxGain, audioReady = false, soundOn = true;
const muteBtn = document.getElementById('muteBtn');
const creditEl = document.getElementById('credit');

function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); }
  catch (e) { return; }
  masterGain = AC.createGain(); masterGain.gain.value = soundOn ? 0.9 : 0; masterGain.connect(AC.destination);
  musicGain  = AC.createGain(); musicGain.gain.value = 0.30; musicGain.connect(masterGain);
  sfxGain    = AC.createGain(); sfxGain.gain.value = 0.55; sfxGain.connect(masterGain);
  audioReady = true;
  unlockAudio();                         // iOS: wake the context the moment we make it
}
function unlockAudio() {
  if (!AC) return;
  if (AC.state === 'suspended') AC.resume();
  try {                                  // a 1-sample silent blip is what iOS needs to truly unlock output
    const b = AC.createBuffer(1, 1, 22050);
    const s = AC.createBufferSource(); s.buffer = b; s.connect(AC.destination); s.start(0);
  } catch (e) {}
}
function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

// short synth note with a quick attack/decay envelope
function tone(freq, t0, dur, type, vol, dest, glideTo) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'square'; o.frequency.setValueAtTime(freq, t0);
  if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(dest || sfxGain);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
function noiseBurst(t0, dur, vol, dest) {
  const n = Math.max(1, Math.floor(AC.sampleRate * dur));
  const buf = AC.createBuffer(1, n, AC.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * (1 - i/n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(g); g.connect(dest || sfxGain); src.start(t0);
}

// ---- sound effects ----
function sfxCoin()  { if (!audioReady) return; const t = AC.currentTime; tone(880, t, 0.07, 'square', 0.28); tone(1320, t+0.05, 0.10, 'square', 0.28); }
function sfxHit()   { if (!audioReady) return; const t = AC.currentTime; tone(430, t, 0.12, 'square', 0.4, sfxGain, 300); tone(300, t+0.12, 0.16, 'square', 0.4, sfxGain, 470); }  // clown "ah-ooo-gah" honk
function sfxBoing()  { if (!audioReady) return; const t = AC.currentTime; tone(620, t, 0.16, 'sine', 0.28, sfxGain, 170); }  // springy lane hop
function sfxLaser() { if (!audioReady) return; const t = AC.currentTime; tone(1300, t, 0.12, 'square', 0.22, sfxGain, 320); }
function sfxBoom(big){ if (!audioReady) return; const t = AC.currentTime; noiseBurst(t, big?0.4:0.18, big?0.5:0.32); tone(big?110:190, t, big?0.4:0.18, 'sawtooth', 0.3, sfxGain, 40); }
function sfxPower() { if (!audioReady) return; const t = AC.currentTime; [0,4,7,12].forEach((s,i)=>tone(midiToFreq(72+s), t+i*0.06, 0.13, 'square', 0.3)); }
function sfxLevel() { if (!audioReady) return; const t = AC.currentTime; [0,4,7,12,16,19].forEach((s,i)=>tone(midiToFreq(60+s), t+i*0.08, 0.16, 'triangle', 0.34)); }
function sfxOver()  {                                   // sad trombone: wah-wah-waaaah
  if (!audioReady) return; const t = AC.currentTime;
  const notes = [233, 207, 185];                        // Bb3 -> Ab3 -> F#3, each drooping
  notes.forEach((f,i) => tone(f, t + i*0.3, 0.28, 'sawtooth', 0.36, sfxGain, f*0.91));
  tone(174, t + 0.9, 0.7, 'sawtooth', 0.38, sfxGain, 110);
}
function sfxFire()  {
  if (!audioReady) return;
  const t = AC.currentTime;
  // whooshing flame: filtered noise that swells then fades
  const n = Math.floor(AC.sampleRate * 0.55), buf = AC.createBuffer(1, n, AC.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1);
  const src = AC.createBufferSource(); src.buffer = buf;
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.setValueAtTime(600, t); bp.frequency.exponentialRampToValueAtTime(180, t+0.5); bp.Q.value = 0.7;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.5, t+0.08); g.gain.exponentialRampToValueAtTime(0.0001, t+0.55);
  src.connect(bp); bp.connect(g); g.connect(sfxGain); src.start(t);
  // a low growl underneath
  tone(90, t, 0.5, 'sawtooth', 0.3, sfxGain, 45);
}

// ---- per-theme music (offsets in semitones from the theme's root) ----
// index matches the THEMES array order
const THEME_MUSIC = [
  { bpm:130, wave:'sawtooth', bass:'square',   root:45,            // VOLCANO  (driving minor)
    lead:[0,7,3,7,0,7,5,7, 0,7,3,7,10,7,8,7], low:[0,null,0,null,5,null,3,null], drum:'k.h.s.h.k.k.s.h.' },
  { bpm:96,  wave:'triangle', bass:'sine',     root:45,            // SPOOKY   (eerie, sparse)
    lead:[0,null,3,null,8,null,7,null,0,null,11,null,8,null,7,6], low:[0,null,null,null,5,null,null,null], drum:'t.......t.....s.' },
  { bpm:122, wave:'square',   bass:'triangle', root:48,            // JUNGLE   (tribal toms)
    lead:[0,4,7,9,7,4,0,null,2,4,7,9,12,9,7,4], low:[0,null,7,null,5,null,7,null], drum:'k.ttk.t.k.ttktt.' },
  { bpm:110, wave:'triangle', bass:'triangle', root:48,            // BEACH    (sunny steel-drum)
    lead:[7,null,4,null,0,null,4,7,9,null,7,null,4,null,2,null], low:[0,null,5,null,7,null,5,null], drum:'k.h.s.h.k.h.s.h.' },
  { bpm:116, wave:'sawtooth', bass:'square',   root:45,            // EGYPT    (phrygian, hand-drum)
    lead:[0,1,4,1,0,null,7,5,4,1,0,null,8,7,5,4], low:[0,null,0,null,5,null,1,null], drum:'k.kts.k.k.kts.s.' },
  { bpm:100, wave:'triangle', bass:'sine',     root:50,            // JAPAN    (hirajoshi, taiko)
    lead:[0,3,7,8,7,3,2,0,null,7,8,7,3,2,0,null], low:[0,null,7,null,3,null,7,null], drum:'k.......k...s...' },
  { bpm:142, wave:'square',   bass:'square',   root:48,            // ROBOTS   (chiptune, four-on-floor)
    lead:[0,3,7,12,7,3,0,3,7,10,7,3,0,3,7,10], low:[0,0,null,0,3,3,null,3], drum:'k.hsk.h.k.hsk.h.' },
  { bpm:168, style:'waltz', wave:'sawtooth', bass:'triangle', root:48,   // PARIS  (accordion musette, 3/4)
    lead:[7,null,12,null,11,null, 9,null,5,null,4,null], low:[], drum:'..h.h...h.h.' },
  { bpm:84,  wave:'sine',     bass:'sine',     root:48,            // UNDER THE SEA (dreamy, gentle)
    lead:[0,null,4,null,7,null,11,null,9,null,7,null,4,null,2,null], low:[0,null,null,null,5,null,null,null], drum:'k.......h...h...' },
];
// upbeat jingle for the title / how-to screens
const TITLE_MUSIC = { bpm:128, wave:'square', bass:'triangle', root:48,
  lead:[0,4,7,12,7,12,16,12, 9,12,16,9,7,4,7,null], low:[0,null,5,null,7,null,5,null], drum:'k.h.s.h.k.h.s.h.' };
let musicTimer = null, musicStep = 0, nextNoteTime = 0, currentMusic = TITLE_MUSIC, musicOn = false;

function startMusic() {
  if (!audioReady || !currentMusic) return;
  musicOn = true;
  musicStep = 0; nextNoteTime = AC.currentTime + 0.1;
  if (musicTimer) clearInterval(musicTimer);
  musicTimer = setInterval(musicScheduler, 25);
}
function stopMusic() { musicOn = false; if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }

function musicScheduler() {
  if (!audioReady || !currentMusic || !musicOn) return;
  const stepDur = 60 / currentMusic.bpm / 2;          // eighth notes
  const len = currentMusic.lead.length;
  if (nextNoteTime < AC.currentTime) nextNoteTime = AC.currentTime + 0.03;  // resync after a stall
  while (nextNoteTime < AC.currentTime + 0.12) {
    playMusicStep(musicStep % len, nextNoteTime, stepDur);
    musicStep = (musicStep + 1) % len;
    nextNoteTime += stepDur;
  }
}
function drumHit(ch, t) {
  if (ch === 'k') {                                   // kick
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(130, t); o.frequency.exponentialRampToValueAtTime(48, t+0.12);
    g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.0001, t+0.14);
    o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+0.16);
  } else if (ch === 's') {                            // snare
    noiseBurst(t, 0.13, 0.26, musicGain); tone(190, t, 0.09, 'triangle', 0.12, musicGain);
  } else if (ch === 't') {                            // tom
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(90, t+0.18);
    g.gain.setValueAtTime(0.38, t); g.gain.exponentialRampToValueAtTime(0.0001, t+0.2);
    o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+0.22);
  } else if (ch === 'h') {                            // hi-hat
    noiseBurst(t, 0.03, 0.05, musicGain);
  }
}
// accordion: two slightly-detuned reeds through a soft filter (musette shimmer)
function accordionNote(freq, t, dur, vol) {
  const o1 = AC.createOscillator(), o2 = AC.createOscillator(), g = AC.createGain(), lp = AC.createBiquadFilter();
  o1.type = 'sawtooth'; o2.type = 'sawtooth';
  o1.frequency.value = freq; o2.frequency.value = freq * 1.007;   // ~12 cents detune
  lp.type = 'lowpass'; lp.frequency.value = 2600; lp.Q.value = 0.4;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.03);
  g.gain.setValueAtTime(vol, t + Math.max(0.05, dur*0.6));
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur + 0.06);
  o1.connect(lp); o2.connect(lp); lp.connect(g); g.connect(musicGain);
  o1.start(t); o2.start(t); o1.stop(t + dur + 0.08); o2.stop(t + dur + 0.08);
}
function playMusicStep(step, t, dur) {
  const m = currentMusic;

  if (m.style === 'waltz') {                 // oom-pah-pah accordion waltz (two bars of 3/4)
    const inBar = step % 6;                   // 0..5 within a bar; beats fall on 0,2,4
    const chord = (step < 6) ? 0 : 7;         // bar 1 = I (C), bar 2 = V (G)
    if (inBar === 0) {                        // "oom" — low bass on beat 1
      tone(midiToFreq(m.root - 12 + chord), t, dur*1.5, 'triangle', 0.34, musicGain);
    } else if (inBar === 2 || inBar === 4) {  // "pah" — mid accordion chord on beats 2 & 3
      [0,4,7].forEach(iv => accordionNote(midiToFreq(m.root + chord + iv), t, dur*0.7, 0.085));
    }
    const ld = m.lead[step];
    if (ld != null) accordionNote(midiToFreq(m.root + 12 + ld), t, dur*1.3, 0.18);  // melody on top
    if (m.drum) drumHit(m.drum[step], t);
    return;
  }

  const ld = m.lead[step];
  if (ld != null) tone(midiToFreq(m.root + 12 + ld), t, dur*0.9, m.wave, 0.20, musicGain);
  if (step % 2 === 0) {
    const b = m.low[(step/2) % m.low.length];
    if (b != null) tone(midiToFreq(m.root - 12 + b), t, dur*1.7, m.bass, 0.28, musicGain);
  }
  if (m.drum) drumHit(m.drum[step], t);
}

// ---- mute toggle ----
function applyMute() {
  if (masterGain) masterGain.gain.value = soundOn ? 0.9 : 0;
  muteBtn.textContent = soundOn ? '\u{1F50A}' : '\u{1F507}';
}
muteBtn.addEventListener('click', e => {
  e.stopPropagation();
  soundOn = !soundOn;
  initAudio();              // first tap also unlocks audio
  applyMute();
  if (soundOn && running) startMusic();
});

function tryFire() {
  if (powerActive && fireCooldown <= 0) {
    bullets.push({ t: T_PLAYER - 0.04, lane: player.lane });
    fireCooldown = FIRE_COOLDOWN_MS;
    sfxLaser();
  }
}

// ---- Spawning ----
// burst of particles when a robot is blasted
function explode(x, y, scale, big) {
  const n = big ? 22 : 12;
  const colors = ['#ff6b00', '#ffd23f', '#ff3b3b', '#fff2b0', '#9aa6b2'];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (1 + Math.random() * 4) * (big ? 1.6 : 1);
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 1.5,
      life: 1,
      size: (2 + Math.random() * 4) * scale * (big ? 1.5 : 1),
      color: colors[(Math.random() * colors.length) | 0]
    });
  }
}

function makeBig() {
  return { t:0, base:-0.6+Math.random()*1.2, lane:0, type:'big',
           done:false, phase:Math.random()*6.28, hp:BIG_HEALTH, flash:0 };
}
function spawnDragon() {
  dragon = { t:DRAGON_T, base:-0.4+Math.random()*0.8, lane:0, phase:Math.random()*6.28,
             life:DRAGON_LIFE_MS, breath:900, breathing:0, hp:DRAGON_HP, flash:0, flap:Math.random()*6 };
}
function breatheFire(d) {
  for (let k = -1; k <= 1; k++) {
    items.push({ t:d.t, lane: Math.max(-0.85, Math.min(0.85, d.lane + k*DRAGON_HEAD_GAP)), type:'fire', done:false });
  }
  sfxFire();
}
// next spawn happens after a randomized gap so timing doesn't feel robotic
function nextGap() {
  const base = powerActive ? POWER_SPAWN_MS : spawnMs;
  return base * (1 - SPAWN_JITTER + Math.random() * SPAWN_JITTER * 2);
}

function mkCoin(lane)  { return { t:0, lane, type:'coin',  done:false, phase:Math.random()*6.28 }; }
function mkRobot(lane) { return { t:0, lane, type:'robot', done:false, phase:Math.random()*6.28 }; }
function queueSpawn(make, delay) { pendingSpawns.push({ make, delay }); }

function spawnItem() {
  // sometimes a laser power-up (only when you don't already have one)
  if (!powerActive && Math.random() < POWER_CHANCE) {
    items.push({ t:0, lane:-0.7+Math.random()*1.4, type:'power', done:false });
    return;
  }
  if (!powerActive && Math.random() < BIGBOT_CHANCE) {
    items.push(makeBig());
    return;
  }
  const robotChance = Math.min(0.7, ROBOT_CHANCE_BASE + level*0.02);
  const lanes3 = [-0.7, 0, 0.7];
  const r = Math.random();

  if (r < 0.76) {                         // single drop (the classic)
    const isRobot = Math.random() < robotChance;
    items.push(isRobot ? mkRobot(-0.8+Math.random()*1.6) : mkCoin(-0.8+Math.random()*1.6));

  } else if (r < 0.85) {                  // a small row of coins to sweep across
    const pool = lanes3.slice().sort(() => Math.random()-0.5).slice(0, 2);
    for (const l of pool) items.push(mkCoin(l));

  } else if (r < 0.92) {                  // two robots with one safe gap
    const open = lanes3[(Math.random()*3)|0];
    for (const l of lanes3) if (l !== open) items.push(mkRobot(l));

  } else if (r < 0.97) {                  // a short stream of coins along one weaving lane
    const n = 3 + (Math.random()*2|0);    // 3..4
    let lane = -0.5 + Math.random();
    const drift = (Math.random()-0.5) * 0.4;
    for (let k = 0; k < n; k++) {
      const l = Math.max(-0.8, Math.min(0.8, lane + drift*k));
      queueSpawn(() => mkCoin(l), k * 180);
    }

  } else {                                // a coin flanked by two robots (greedy risk)
    const c = -0.4 + Math.random()*0.8;
    items.push(mkCoin(c));
    items.push(mkRobot(Math.max(-0.85, c-0.62)));
    items.push(mkRobot(Math.min(0.85, c+0.62)));
  }
}

function levelUp() {
  level++; coinsThisLevel = 0;
  speed   = Math.min(MAX_SPEED,    START_SPEED + (level-1)*SPEED_PER_LEVEL);
  spawnMs = Math.max(MIN_SPAWN_MS, START_SPAWN_MS - (level-1)*SPAWN_SPEEDUP_MS);
  pickTheme();
  sfxLevel();
  levelFlash.textContent = 'LEVEL ' + level + ' — ' + currentTheme.name + '!';
  levelFlash.classList.remove('show'); void levelFlash.offsetWidth;
  levelFlash.classList.add('show');
}
function startPower() {
  powerActive = true; powerTimer = POWER_MS;
  sfxPower();
  levelFlash.textContent = 'LASER!';
  levelFlash.classList.remove('show'); void levelFlash.offsetWidth;
  levelFlash.classList.add('show');
}

// ---- Update ----
function update(dt) {
  // make movement run the same speed on any screen (60Hz, 120Hz, etc.)
  // step == 1 at 60fps; clamp dt so switching tabs doesn't teleport everything
  const step = Math.min(dt, 50) / 16.667;

  runPhase += 0.35 * step;
  stripeScroll = (stripeScroll + speed * step) % STRIPE_GAP;
  sideScroll = (sideScroll + speed * step) % SIDE_GAP;
  if (hitFlash > 0) hitFlash -= dt;

  // power-up countdown
  if (powerActive) {
    powerTimer -= dt;
    if (powerTimer <= 0) {            // laser fades: clear the leftover swarm so it's fair
      powerActive = false;
      items = items.filter(it => it.type !== 'robot' && it.type !== 'big' && it.type !== 'fire');
    }
  }
  fireBtn.style.display = powerActive ? 'block' : 'none';

  // shooting
  fireCooldown -= dt;
  if (powerActive && (keys[' '] || fireHeld)) tryFire();

  // move runner
  if (keys['ArrowLeft']  || keys['a']) player.lane -= PLAYER_MOVE * step;
  if (keys['ArrowRight'] || keys['d']) player.lane += PLAYER_MOVE * step;
  if (pointerLane !== null) player.lane += (pointerLane - player.lane) * (1 - Math.pow(0.7, step));
  player.lane = Math.max(-0.85, Math.min(0.85, player.lane));

  // spawn after a randomized gap; during a power-up a swarm pours in
  spawnTimer += dt;
  if (spawnTimer >= spawnGap) {
    spawnTimer = 0;
    spawnGap = nextGap();
    if (powerActive) {
      for (let n = 0; n < POWER_SWARM_COUNT; n++) {
        const r = Math.random();
        if (r < SWARM_COIN_CHANCE)
          items.push({ t:0, lane:-0.85+Math.random()*1.7, type:'coin', done:false });
        else if (r < SWARM_COIN_CHANCE + SWARM_BIG_CHANCE)
          items.push(makeBig());
        else
          items.push({ t:0, lane:-0.85+Math.random()*1.7, type:'robot', done:false });
      }
    } else {
      if (!dragon && Math.random() < DRAGON_CHANCE) spawnDragon();
      spawnItem();
    }
  }

  // release delayed spawns (used for coin trails) — paused during a laser swarm
  if (!powerActive) {
    for (let i = pendingSpawns.length - 1; i >= 0; i--) {
      pendingSpawns[i].delay -= dt;
      if (pendingSpawns[i].delay <= 0) { items.push(pendingSpawns[i].make()); pendingSpawns.splice(i, 1); }
    }
  } else if (pendingSpawns.length) {
    pendingSpawns = [];
  }

  // update the dragon: drift, breathe fire, fly off when its time is up
  if (dragon) {
    dragon.flap += 0.18 * step;
    dragon.life -= dt;
    if (dragon.flash > 0) dragon.flash--;
    if (dragon.breathing > 0) dragon.breathing -= dt;
    dragon.lane = Math.max(-0.7, Math.min(0.7,
      dragon.base + Math.sin(dragon.flap*0.4 + dragon.phase) * DRAGON_SWAY_AMP));
    dragon.breath -= dt;
    if (dragon.breath <= 0) { dragon.breath = DRAGON_BREATH_MS; dragon.breathing = 500; breatheFire(dragon); }
    if (dragon.life <= 0) dragon = null;
  }

  // move explosion particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const pa = particles[i];
    pa.x += pa.vx * step; pa.y += pa.vy * step; pa.vy += 0.15 * step;   // gravity
    pa.life -= dt / 450;                            // ~0.45s lifetime
    if (pa.life <= 0) particles.splice(i, 1);
  }

  // move bullets away from you and blast robots
  for (let b = bullets.length - 1; b >= 0; b--) {
    const bu = bullets[b];
    bu.t -= BULLET_SPEED * step;
    let used = false;
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if ((it.type === 'robot' || it.type === 'big') && !it.done &&
          Math.abs(it.t - bu.t) < BULLET_HIT_T &&
          Math.abs(it.lane - bu.lane) < BULLET_HIT_LANE) {
        const pr = project(it.t, it.lane);
        const ex = pr.x, ey = pr.y - 20 * pr.scale;
        if (it.type === 'big') {
          it.hp--; it.flash = 6; score += 5;
          explode(ex, ey, pr.scale, false);              // sparks on each hit
          if (it.hp <= 0) { score += 15; explode(ex, ey, pr.scale, true); items.splice(i, 1); sfxBoom(true); }
          else sfxBoom(false);
        } else {
          score += SHOOT_POINTS; explode(ex, ey, pr.scale, false); items.splice(i, 1); sfxBoom(false);
        }
        used = true; break;
      }
    }
    if (!used && dragon &&
        Math.abs(dragon.t - bu.t) < 0.14 &&
        Math.abs(dragon.lane - bu.lane) < 0.3) {
      const dp = project(dragon.t, dragon.lane);
      const dy = dp.y - 175 * dp.scale * 1.3;
      dragon.hp--; dragon.flash = 5; score += 5;
      explode(dp.x, dy, dp.scale * 1.2, false);
      if (dragon.hp <= 0) { explode(dp.x, dy, dp.scale * 1.6, true); score += 100; dragon = null; sfxBoom(true); }
      else sfxBoom(false);
      used = true;
    }
    if (used || bu.t < -0.05) bullets.splice(b, 1);
  }

  // move items toward you + catch / bonk
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.t += ((it.type === 'big') ? speed * BIG_SPEED_MULT
           : (it.type === 'fire') ? FIRE_SPEED : speed) * step;
    if (it.type === 'big') {            // big robot weaves left and right
      if (it.flash > 0) it.flash--;
      it.lane = Math.max(-0.8, Math.min(0.8,
        it.base + Math.sin(it.t * BIG_SWAY_FREQ + it.phase) * BIG_SWAY_AMP));
    }
    if (!it.done && it.t >= T_PLAYER) {
      it.done = true;
      const w = (it.type === 'big') ? BIG_HIT_WIDTH : HIT_WIDTH;
      if (Math.abs(it.lane - player.lane) < w) {
        if (it.type === 'coin') {
          score += 10; coinsThisLevel++; sfxCoin();
          if (coinsThisLevel >= COINS_PER_LEVEL) levelUp();
          items.splice(i, 1); continue;
        } else if (it.type === 'power') {
          startPower();
          items.splice(i, 1); continue;
        } else { // robot or big robot
          if (!powerActive) {            // during a power-up robots can't hurt you
            hearts--; hitFlash = 350; sfxHit();   // red flash + shake feedback
            if (hearts <= 0) return gameOver();
          }
          items.splice(i, 1); continue;
        }
      }
    }
    if (it.t > 1.15) items.splice(i, 1);
  }
}

// shared scenery helper: a little palm tree
function palm(px, baseY, sc) {
  sc = sc || 1;
  ctx.strokeStyle = '#6b4a2a'; ctx.lineWidth = 6*sc; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(px, baseY); ctx.quadraticCurveTo(px+8*sc, baseY-30*sc, px+4*sc, baseY-56*sc); ctx.stroke();
  ctx.strokeStyle = '#2f8f3a'; ctx.lineWidth = 5*sc;
  for (let a = 0; a < 5; a++) {
    const ang = -Math.PI/2 + (a-2)*0.55;
    const lx = px+4*sc + Math.cos(ang)*32*sc, ly = baseY-56*sc + Math.sin(ang)*32*sc;
    ctx.beginPath(); ctx.moveTo(px+4*sc, baseY-56*sc);
    ctx.quadraticCurveTo((px+4*sc+lx)/2, ly-10*sc, lx, ly); ctx.stroke();
  }
}
function cloud(cx, cy, r, alpha) {
  ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.arc(cx+r*1.1, cy+r*0.25, r*0.78, 0, Math.PI*2); ctx.arc(cx-r*1.0, cy+r*0.28, r*0.7, 0, Math.PI*2); ctx.fill();
}

let themeBag = [], currentTheme = THEMES[0];
function pickTheme() {
  if (themeBag.length === 0) {
    themeBag = THEMES.map((_, i) => i);
    for (let i = themeBag.length-1; i > 0; i--) { const j = (Math.random()*(i+1))|0; [themeBag[i], themeBag[j]] = [themeBag[j], themeBag[i]]; }
    if (THEMES[themeBag[themeBag.length-1]] === currentTheme && themeBag.length > 1)
      [themeBag[0], themeBag[themeBag.length-1]] = [themeBag[themeBag.length-1], themeBag[0]];
  }
  const idx = themeBag.pop();
  currentTheme = THEMES[idx];
  currentMusic = THEME_MUSIC[idx] || currentMusic;
}

// ---- Drawing ----
function drawWorld() {
  const th = currentTheme;
  const sky = ctx.createLinearGradient(0, 0, 0, horizonY);
  sky.addColorStop(0, th.sky[0]); sky.addColorStop(1, th.sky[1]);
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, horizonY);
  th.scenery();
  ctx.fillStyle = th.ground; ctx.fillRect(0, horizonY, W, H - horizonY);
  ctx.fillStyle = th.road;
  ctx.beginPath();
  ctx.moveTo(centerX - roadTopHalf, horizonY);
  ctx.lineTo(centerX + roadTopHalf, horizonY);
  ctx.lineTo(centerX + roadBotHalf, groundY);
  ctx.lineTo(centerX - roadBotHalf, groundY);
  ctx.closePath(); ctx.fill();
  for (let k = 0; k < NSTRIPES; k++) {
    const t = ((k / NSTRIPES) + stripeScroll) % 1;
    const a = project(t, -1), b = project(t, 1);
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.10 + t*0.25) + ')';
    ctx.lineWidth = 1 + t * 5;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  drawRoadside();
}

// scrolling theme props lining both sides of the road
function drawRoadside() {
  const th = currentTheme;
  if (!th.side) return;
  const props = [];
  for (let k = 0; k < SIDE_N; k++) {
    const t = ((k / SIDE_N) + sideScroll) % 1;
    props.push({ t, sgn: -1 }, { t, sgn: 1 });
  }
  props.sort((a, b) => a.t - b.t);
  for (const pr of props) {
    const p = project(pr.t, pr.sgn * SIDE_LANE);
    if (p.scale < 0.12) continue;
    th.side(p.x, p.y, p.scale, pr.sgn);
  }
}

function drawCoin(it) {
  const p = project(it.t, it.lane); const r = 18 * p.scale;
  if (r < 0.5) return;
  ctx.fillStyle = '#ffd23f';
  ctx.beginPath(); ctx.arc(p.x, p.y - r, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e0a800';
  ctx.font = 'bold ' + (r*1.1) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('$', p.x, p.y - r + 1);
}

    ctx.beginPath();
    ctx.moveTo(p.x, p.y - r - r*1.4*sc*f);
    ctx.quadraticCurveTo(p.x - r*sc, p.y - r - r*0.4*sc, p.x - r*0.8*sc, p.y - r + r*0.4*sc);
    ctx.quadraticCurveTo(p.x, p.y - r + r*0.9*sc, p.x + r*0.8*sc, p.y - r + r*0.4*sc);
    ctx.quadraticCurveTo(p.x + r*sc, p.y - r - r*0.4*sc, p.x, p.y - r - r*1.4*sc*f);
    ctx.closePath(); ctx.fill();
  }
  flame('#ff3b00', 1.0);
  flame('#ff8c00', 0.7);
  flame('#ffd23f', 0.42);
  flame('#fff6c0', 0.2);
}
function drawDragon(d) {
  const p = project(d.t, d.lane); const s = 175 * p.scale;
  const cx = p.x, cy = p.y - s*1.3;
  const flap = Math.sin(d.flap);
  const hit = d.flash > 0;
  const skin   = hit ? '#ffd2d2' : '#c0392b';
  const skinDk = hit ? '#ffbcbc' : '#922018';
  const belly  = hit ? '#ffe9c0' : '#e0a82e';
  const memCol = hit ? '#ffdede' : '#7a1f16';
  const bone   = hit ? '#ffeaea' : '#b5503f';

  // wings (behind body)
  function wing(sgn) {
    const shx = cx + sgn*s*0.35, shy = cy - s*0.15;
    const tipx = cx + sgn*s*2.0,  tipy = cy - s*0.9 - flap*s*0.7;
    const elx = cx + sgn*s*1.15, ely = cy - s*0.55 - flap*s*0.35;
    ctx.fillStyle = memCol;
    ctx.beginPath();
    ctx.moveTo(shx, shy);
    ctx.quadraticCurveTo(elx, ely, tipx, tipy);
    ctx.quadraticCurveTo(cx + sgn*s*1.5, cy + s*0.1, cx + sgn*s*1.15, cy + s*0.35);
    ctx.quadraticCurveTo(cx + sgn*s*0.95, cy + s*0.05, cx + sgn*s*0.7, cy + s*0.35);
    ctx.quadraticCurveTo(cx + sgn*s*0.55, cy + s*0.1, cx + sgn*s*0.3, cy + s*0.3);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = bone; ctx.lineWidth = s*0.07; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(shx, shy); ctx.lineTo(tipx, tipy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(elx, ely); ctx.lineTo(cx + sgn*s*1.15, cy + s*0.35); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(elx, ely); ctx.lineTo(cx + sgn*s*0.7, cy + s*0.35); ctx.stroke();
  }
  wing(-1); wing(1);

  // tail (curls up & behind, spade tip)
  const tailWag = Math.sin(d.flap*0.6)*s*0.4;
  ctx.strokeStyle = skin; ctx.lineWidth = s*0.32; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, cy - s*0.4);
  ctx.quadraticCurveTo(cx + tailWag, cy - s*1.3, cx - tailWag*0.6, cy - s*1.9);
  ctx.stroke();
  const stx = cx - tailWag*0.6, sty = cy - s*1.9;
  ctx.fillStyle = belly;
  ctx.beginPath();
  ctx.moveTo(stx, sty - s*0.35); ctx.lineTo(stx - s*0.28, sty + s*0.05);
  ctx.lineTo(stx + s*0.28, sty + s*0.05); ctx.closePath(); ctx.fill();

  // body + belly plates
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.ellipse(cx, cy, s*0.62, s*0.95, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = belly;
  ctx.beginPath(); ctx.ellipse(cx, cy + s*0.2, s*0.34, s*0.7, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = skinDk; ctx.lineWidth = s*0.04;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath(); ctx.moveTo(cx - s*0.3, cy + s*0.2 + i*s*0.18);
    ctx.lineTo(cx + s*0.3, cy + s*0.2 + i*s*0.18); ctx.stroke();
  }

  // back spikes along the spine
  ctx.fillStyle = skinDk;
  for (let i = 0; i < 4; i++) {
    const sy = cy - s*0.2 - i*s*0.32;
    ctx.beginPath(); ctx.moveTo(cx - s*0.12, sy); ctx.lineTo(cx, sy - s*0.3);
    ctx.lineTo(cx + s*0.12, sy); ctx.closePath(); ctx.fill();
  }

  // clawed feet
  ctx.strokeStyle = skinDk; ctx.lineWidth = s*0.14; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - s*0.4, cy + s*0.6); ctx.lineTo(cx - s*0.55, cy + s*1.0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + s*0.4, cy + s*0.6); ctx.lineTo(cx + s*0.55, cy + s*1.0); ctx.stroke();

  // ---- THREE HEADS on fanning necks ----
  // a head drawn at screen (hx, hy), with optional fire
  function head(hx, hy, breathing) {
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.ellipse(hx, hy, s*0.34, s*0.32, 0, 0, Math.PI*2); ctx.fill();   // skull
    ctx.beginPath();                                                                      // upper snout
    ctx.moveTo(hx - s*0.27, hy + s*0.04);
    ctx.quadraticCurveTo(hx, hy + s*0.38, hx + s*0.27, hy + s*0.04);
    ctx.quadraticCurveTo(hx, hy + s*0.16, hx - s*0.27, hy + s*0.04);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = skinDk;                                                               // open lower jaw
    ctx.beginPath();
    ctx.moveTo(hx - s*0.22, hy + s*0.18);
    ctx.quadraticCurveTo(hx, hy + s*0.52, hx + s*0.22, hy + s*0.18);
    ctx.quadraticCurveTo(hx, hy + s*0.33, hx - s*0.22, hy + s*0.18);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';                                                               // teeth
    for (let i = -1; i <= 1; i++) {
      const tx = hx + i*s*0.11;
      ctx.beginPath(); ctx.moveTo(tx - s*0.025, hy + s*0.16);
      ctx.lineTo(tx + s*0.025, hy + s*0.16); ctx.lineTo(tx, hy + s*0.27); ctx.closePath(); ctx.fill();
    }
    ctx.strokeStyle = belly; ctx.lineWidth = s*0.1; ctx.lineCap = 'round';                // horns
    ctx.beginPath(); ctx.moveTo(hx - s*0.24, hy - s*0.22); ctx.quadraticCurveTo(hx - s*0.48, hy - s*0.45, hx - s*0.36, hy - s*0.68); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hx + s*0.24, hy - s*0.22); ctx.quadraticCurveTo(hx + s*0.48, hy - s*0.45, hx + s*0.36, hy - s*0.68); ctx.stroke();
    ctx.fillStyle = '#ffe14d';                                                            // glowing eyes
    ctx.beginPath(); ctx.ellipse(hx - s*0.14, hy - s*0.02, s*0.08, s*0.11, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx + s*0.14, hy - s*0.02, s*0.08, s*0.11, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(hx - s*0.14, hy + s*0.01, s*0.025, s*0.075, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx + s*0.14, hy + s*0.01, s*0.025, s*0.075, 0, 0, Math.PI*2); ctx.fill();
    if (breathing) {                                                                      // fire from THIS head
      const mx = hx, my = hy + s*0.35, len = s*1.9;
      function flame(col, sc) {
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.moveTo(mx - s*0.22*sc, my);
        ctx.quadraticCurveTo(mx - s*0.42*sc, my + len*0.5*sc, mx + (Math.random()-0.5)*s*0.35*sc, my + len*sc);
        ctx.quadraticCurveTo(mx + s*0.42*sc, my + len*0.5*sc, mx + s*0.22*sc, my);
        ctx.closePath(); ctx.fill();
      }
      flame('rgba(255,50,0,0.65)', 1.1);
      flame('rgba(255,120,0,0.85)', 0.8);
      flame('rgba(255,200,40,0.95)', 0.5);
      flame('rgba(255,255,220,1)', 0.25);
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = 'rgba(255,170,40,' + (0.4 + Math.random()*0.5) + ')';
        ctx.beginPath(); ctx.arc(mx + (Math.random()-0.5)*s*0.6, my + Math.random()*len, s*0.04 + Math.random()*s*0.05, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  const breathing = d.breathing > 0;
  const necks = [-1, 0, 1].map(k => {
    const hx = project(d.t, Math.max(-0.85, Math.min(0.85, d.lane + k*DRAGON_HEAD_GAP))).x;
    const hy = cy + s*(1.05 - 0.14*Math.abs(k));   // side heads sit a touch higher (fan)
    return { k, hx, hy };
  });
  // necks first (behind heads)
  ctx.strokeStyle = skin; ctx.lineWidth = s*0.22; ctx.lineCap = 'round';
  for (const n of necks) {
    ctx.beginPath();
    ctx.moveTo(cx + n.k*s*0.18, cy + s*0.45);
    ctx.quadraticCurveTo(cx + n.k*s*0.4, cy + s*0.8, n.hx, n.hy - s*0.2);
    ctx.stroke();
  }
  // draw side heads first, center head last (center overlaps on top)
  for (const n of necks.filter(n => n.k !== 0)) head(n.hx, n.hy, breathing);
  const mid = necks.find(n => n.k === 0); head(mid.hx, mid.hy, breathing);

  // health bar (above)
  const bw = s*1.4, bx = cx - bw/2, by = cy - s*2.25;
  ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(bx, by, bw, s*0.16);
  ctx.fillStyle = '#ff3b3b'; ctx.fillRect(bx, by, bw * (d.hp/DRAGON_HP), s*0.16);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1, s*0.02); ctx.strokeRect(bx, by, bw, s*0.16);
}
function drawPower(it) {
  const p = project(it.t, it.lane); const r = 16 * p.scale;
  if (r < 0.5) return;
  ctx.fillStyle = 'rgba(0,229,255,.30)';
  ctx.beginPath(); ctx.arc(p.x, p.y - r, r*1.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#00e5ff';
  ctx.beginPath(); ctx.arc(p.x, p.y - r, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(p.x, p.y - r, r*0.45, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 * p.scale;
  ctx.beginPath(); ctx.moveTo(p.x - r*1.4, p.y - r); ctx.lineTo(p.x + r*1.4, p.y - r); ctx.stroke();
}
function drawBullet(b) {
  const p = project(b.t, b.lane); const s = p.scale;
  ctx.strokeStyle = '#7dfcff'; ctx.lineWidth = 4*s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y - 16*s); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(p.x, p.y - 16*s, 3*s, 0, Math.PI*2); ctx.fill();
}

function drawRunner() {
  const p = project(T_PLAYER, player.lane); const s = p.scale;
  const bob = Math.sin(runPhase) * 3 * s;
  const swing = Math.sin(runPhase) * 10 * s;
  const x = p.x, y = p.y - bob;
  const th = currentTheme;
  const suit = powerActive ? '#5dd0ff' : th.suit;   // suit glows blue with the laser
  if (th.behind) th.behind(x, y, s, swing);
  // legs
  ctx.strokeStyle = th.legs || '#2b2b2b'; ctx.lineWidth = 7*s; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x-6*s, y-8*s); ctx.lineTo(x-9*s+swing, y+22*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+6*s, y-8*s); ctx.lineTo(x+9*s-swing, y+22*s); ctx.stroke();
  // body
  ctx.fillStyle = suit;
  ctx.beginPath(); ctx.roundRect(x-15*s, y-30*s, 30*s, 26*s, 8*s); ctx.fill();
  // arms
  ctx.strokeStyle = suit; ctx.lineWidth = 7*s;
  ctx.beginPath(); ctx.moveTo(x-12*s, y-22*s); ctx.lineTo(x-18*s-swing*0.6, y-8*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+12*s, y-22*s); ctx.lineTo(x+18*s+swing*0.6, y-8*s); ctx.stroke();
  // head
  ctx.fillStyle = th.skin;
  ctx.beginPath(); ctx.arc(x, y-42*s, 13*s, 0, Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x-4*s, y-44*s, 2.4*s, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4*s, y-44*s, 2.4*s, 0, Math.PI*2); ctx.fill();
  // costume
  if (th.accessory) th.accessory(x, y, s, swing, powerActive);
}

function drawHUD() {
  for (let i = 0; i < hearts; i++) {
    ctx.fillStyle = '#ff5d5d';
    const hx = 26 + i*34, hy = 24;
    ctx.beginPath();
    ctx.moveTo(hx, hy+6);
    ctx.bezierCurveTo(hx, hy, hx-12, hy, hx-12, hy+8);
    ctx.bezierCurveTo(hx-12, hy+16, hx, hy+20, hx, hy+26);
    ctx.bezierCurveTo(hx, hy+20, hx+12, hy+16, hx+12, hy+8);
    ctx.bezierCurveTo(hx+12, hy, hx, hy, hx, hy+6);
    ctx.fill();
  }
  ctx.fillStyle = '#fff'; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.font = 'bold 26px Trebuchet MS, sans-serif'; ctx.fillText('Score ' + score, W-16, 16);
  ctx.font = 'bold 18px Trebuchet MS, sans-serif'; ctx.fillText('Level ' + level, W-16, 48);
  ctx.fillText('Coins ' + coinsThisLevel + '/' + COINS_PER_LEVEL, W-16, 72);
  // laser timer bar
  if (powerActive) {
    const bw = 120, x0 = 20, y0 = 56;
    ctx.fillStyle = 'rgba(255,255,255,.25)'; ctx.fillRect(x0, y0, bw, 8);
    ctx.fillStyle = '#00e5ff'; ctx.fillRect(x0, y0, bw * (powerTimer / POWER_MS), 8);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const shake = hitFlash > 0 ? (hitFlash / 350) * 6 : 0;
  ctx.save();
  if (shake) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  drawWorld();
  const sorted = items.slice().sort((a,b) => a.t - b.t);
  let dragonDrawn = !dragon;
  for (const it of sorted) {
    if (!dragonDrawn && dragon.t <= it.t) { drawDragon(dragon); dragonDrawn = true; }
    if (it.type === 'coin') drawCoin(it);
    else if (it.type === 'robot') currentTheme.small(it);
    else if (it.type === 'big') currentTheme.big(it);
    else if (it.type === 'fire') drawFire(it);
    else drawPower(it);
  }
  if (!dragonDrawn) drawDragon(dragon);
  for (const b of bullets) drawBullet(b);
  for (const pa of particles) {
    ctx.globalAlpha = Math.max(0, pa.life);
    ctx.fillStyle = pa.color;
    ctx.beginPath(); ctx.arc(pa.x, pa.y, pa.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  drawRunner();
  ctx.restore();
  // red flash when hit (full screen, drawn steady on top)
  if (hitFlash > 0) {
    ctx.fillStyle = 'rgba(255,0,0,' + (0.35 * hitFlash / 350) + ')';
    ctx.fillRect(0, 0, W, H);
  }
  drawHUD();
}

function sunburst(cx, cy, rot) {

  for (let i = 0; i < 22; i++) {

// chunky outlined logo text with a 3D drop
function logoText(txt, cx, cy, size) {

// ---- landmark emblems (reused theme background art, drawn standalone) ----
function emblemVolcano(x, hy, h) {
  ctx.fillStyle = '#3a1c14';
  ctx.beginPath(); ctx.moveTo(x-h*0.7, hy); ctx.lineTo(x-h*0.22, hy-h); ctx.lineTo(x+h*0.22, hy-h); ctx.lineTo(x+h*0.7, hy); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,90,0,0.3)'; ctx.beginPath(); ctx.arc(x, hy-h-4, h*0.3, 0, 7); ctx.fill();
  ctx.fillStyle = '#ff7a00'; ctx.beginPath(); ctx.ellipse(x, hy-h, h*0.22, 4, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = '#ff5a00'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x-5, hy-h+3); ctx.quadraticCurveTo(x-h*0.3, hy-h*0.5, x-h*0.34, hy); ctx.stroke();

function emblemPyramid(x, hy, h) {

function emblemEiffel(x, hy, h) {

  const iron = '#43392d', lat = '#5d5040';

  // curved base legs
  const leg = (sgn) => {
    const oB = x+sgn*40*k, iB = x+sgn*22*k, oT = x+sgn*20*k, iT = x+sgn*9*k, cy = by - 0.12*h;
    ctx.beginPath(); ctx.moveTo(oB, by);
    ctx.quadraticCurveTo(x+sgn*28*k, cy, oT, p1); ctx.lineTo(iT, p1);
    ctx.quadraticCurveTo(x+sgn*15*k, cy, iB, by); ctx.closePath(); ctx.fill();

  ctx.lineWidth = Math.max(2, 4*k);

  ctx.fillRect(x-28*k, p1-6*k, 56*k, 7*k);                                   // platform 1
  // mid section + lattice
  ctx.beginPath(); ctx.moveTo(x-17*k, p1); ctx.lineTo(x-10*k, p2); ctx.lineTo(x+10*k, p2); ctx.lineTo(x+17*k, p1); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = lat; ctx.lineWidth = Math.max(1, 1.4*k);
  ctx.beginPath();
  ctx.moveTo(x-15*k, p1); ctx.lineTo(x+8*k, p2); ctx.moveTo(x+15*k, p1); ctx.lineTo(x-8*k, p2);
  ctx.moveTo(x-12.5*k, (p1+p2)/2); ctx.lineTo(x+12.5*k, (p1+p2)/2); ctx.stroke();
  ctx.fillStyle = iron; ctx.fillRect(x-13*k, p2-5*k, 26*k, 6*k);             // platform 2
  // upper column + lattice
  ctx.beginPath(); ctx.moveTo(x-9*k, p2); ctx.lineTo(x-3*k, p3); ctx.lineTo(x+3*k, p3); ctx.lineTo(x+9*k, p2); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = lat; ctx.lineWidth = Math.max(1, 1.2*k); ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const f0 = i/4, f1 = (i+1)/4, y0 = p2+(p3-p2)*f0, y1 = p2+(p3-p2)*f1, w0 = (9-(9-3)*f0)*k, w1 = (9-(9-3)*f1)*k;
    ctx.moveTo(x-w0, y0); ctx.lineTo(x+w1, y1); ctx.moveTo(x+w0, y0); ctx.lineTo(x-w1, y1);
  }
  ctx.stroke();

  ctx.fillStyle = iron; ctx.fillRect(x-5*k, p3-4*k, 10*k, 5*k);
  ctx.beginPath(); ctx.moveTo(x-3*k, p3); ctx.lineTo(x, tip); ctx.lineTo(x+3*k, p3); ctx.closePath(); ctx.fill();
  ctx.fillRect(x-1*k, tip-8*k, 2*k, 8*k);
  ctx.beginPath(); ctx.arc(x, tip-9*k, Math.max(1.5, 2*k), 0, 7); ctx.fill();
  // a few twinkling lights
  for (let i = 0; i < 14; i++) {
    const f = i/14, yy = by - f*h, half = (30*(1-f)+3)*k;
    if (Math.sin(clock/180 + i*2.4) > 0.4) { ctx.fillStyle = '#fff6c0'; ctx.beginPath(); ctx.arc(x + Math.sin(i*12.9)*half, yy, 1.4, 0, 7); ctx.fill(); }

}

function flower(x, y, col, s) {

function star(cx, cy, spikes, outer, inner) {
  let rot = -Math.PI/2; ctx.beginPath();
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx+Math.cos(rot)*outer, cy+Math.sin(rot)*outer); rot += Math.PI/spikes;
    ctx.lineTo(cx+Math.cos(rot)*inner, cy+Math.sin(rot)*inner); rot += Math.PI/spikes;
  }
  ctx.closePath(); ctx.fill();
}
function drawIcon(kind, x, y, s) {
  ctx.save(); ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  if (kind === 'keys' || kind === 'drag') {
    ctx.fillStyle = '#ffd23f'; ctx.strokeStyle = '#0d1b2a';
    ctx.beginPath(); ctx.moveTo(x-s, y); ctx.lineTo(x-3, y-8); ctx.lineTo(x-3, y+8); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+s, y); ctx.lineTo(x+3, y-8); ctx.lineTo(x+3, y+8); ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (kind === 'coin') {
    ctx.fillStyle = '#ffd23f'; ctx.strokeStyle = '#caa01f'; ctx.beginPath(); ctx.arc(x, y, s*0.85, 0, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff6c0'; star(x, y, 5, s*0.45, s*0.2);
  } else if (kind === 'robot') {
    ctx.fillStyle = '#9aa6b2'; ctx.strokeStyle = '#0d1b2a'; ctx.beginPath(); ctx.roundRect(x-s*0.8, y-s*0.8, s*1.6, s*1.6, 3); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ff3b3b'; ctx.beginPath(); ctx.arc(x-s*0.3, y-s*0.1, s*0.18, 0, 7); ctx.arc(x+s*0.3, y-s*0.1, s*0.18, 0, 7); ctx.fill();
  } else if (kind === 'laser') {
    ctx.fillStyle = '#00e5ff'; ctx.strokeStyle = '#007a8a'; ctx.beginPath(); ctx.arc(x, y, s*0.85, 0, 7); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x-s*0.4, y); ctx.lineTo(x+s*0.4, y); ctx.stroke();
  } else if (kind === 'big') {
    ctx.fillStyle = '#7d8896'; ctx.strokeStyle = '#0d1b2a'; ctx.beginPath(); ctx.roundRect(x-s, y-s, s*2, s*2, 4); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffe87a'; ctx.beginPath(); ctx.arc(x-s*0.35, y-s*0.2, s*0.16, 0, 7); ctx.arc(x+s*0.35, y-s*0.2, s*0.16, 0, 7); ctx.fill();
    ctx.fillStyle = '#ff3b3b'; for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(x-s*0.5+i*s*0.5, y+s*0.6, s*0.12, 0, 7); ctx.fill(); }
  } else if (kind === 'shield') {
    ctx.fillStyle = '#5dd0ff'; ctx.strokeStyle = '#0d1b2a';
    ctx.beginPath();
    ctx.moveTo(x, y-s); ctx.lineTo(x+s*0.8, y-s*0.6); ctx.lineTo(x+s*0.8, y+s*0.2);
    ctx.quadraticCurveTo(x+s*0.8, y+s*0.9, x, y+s*1.1);
    ctx.quadraticCurveTo(x-s*0.8, y+s*0.9, x-s*0.8, y+s*0.2);
    ctx.lineTo(x-s*0.8, y-s*0.6); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; star(x, y, 5, s*0.4, s*0.18);
  } else if (kind === 'dragon') {
    ctx.fillStyle = '#c0392b'; ctx.strokeStyle = '#0d1b2a';
    ctx.beginPath(); ctx.arc(x, y, s*0.75, 0, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#c0392b';
    ctx.beginPath(); ctx.moveTo(x-s*0.3, y-s*0.5); ctx.lineTo(x-s*0.55, y-s*1.05); ctx.lineTo(x-s*0.05, y-s*0.55); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+s*0.3, y-s*0.5); ctx.lineTo(x+s*0.55, y-s*1.05); ctx.lineTo(x+s*0.05, y-s*0.55); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffd23f'; ctx.beginPath(); ctx.arc(x-s*0.25, y, s*0.12, 0, 7); ctx.arc(x+s*0.25, y, s*0.12, 0, 7); ctx.fill();
  }
  ctx.restore();
}

// ---- Hall of Fame (Supabase REST) ----
const hofOnline = () => SUPABASE_URL && SUPABASE_KEY;
let overlayView = 'over', hofFrom = 'over', lastName = '';
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
async function fetchTopScores() {
  if (!hofOnline()) return null;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/scores?select=name,score&order=score.desc&limit=${HOF_LIMIT}`,
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}
async function submitScore(name, sc) {
  if (!hofOnline()) return false;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY,
                 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ name: name.slice(0, 14), score: sc })
    });
    return r.ok;
  } catch (e) { return false; }
}
let playCount = null;
async function fetchPlayCount() {
  if (!hofOnline()) return;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/plays?select=id`, {
      method: 'HEAD',
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY, Prefer: 'count=exact' }
    });
    const cr = r.headers.get('content-range');   // e.g. "*/1234"
    if (cr && cr.includes('/')) { const n = parseInt(cr.split('/')[1], 10); if (!isNaN(n)) playCount = n; }
  } catch (e) {}
}
async function bumpPlayCount() {
  if (playCount != null) playCount++;            // update the on-screen number right away
  if (!hofOnline()) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/plays`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY,
                 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: '{}'
    });
  } catch (e) {}
}

function gameOver() {
  running = false; fireBtn.style.display = 'none';
  stopMusic(); sfxOver();
  showGameOver();
}
function showGameOver() {
  overlayView = 'over';
  const isBest = score > bestScore; if (isBest) bestScore = score;
  ovTitle.textContent = isBest ? 'NEW BEST! 🎉' : 'GAME OVER';
  ovText.style.display = 'block';
  ovText.textContent = 'Score: ' + score + '   •   Best: ' + bestScore;
  hofNote.style.display = 'none'; hofList.style.display = 'none';
  if (hofOnline() && score > 0) {
    nameRow.style.display = 'flex';
    submitBtn.disabled = false; submitBtn.textContent = 'SUBMIT SCORE';
    if (!nameInput.value && lastName) nameInput.value = lastName;
  } else nameRow.style.display = 'none';
  ovBtn.textContent = 'PLAY AGAIN';
  hofBtn.style.display = hofOnline() ? 'inline-block' : 'none';
  hofBtn.textContent = 'HALL OF FAME';
  overlay.style.display = 'flex';
}
async function showHallOfFame(from, msg) {
  overlayView = 'hof'; hofFrom = from;
  if (from === 'title') { bigBtn.style.display = 'none'; creditEl.style.display = 'none'; hofTitleBtn.style.display = 'none'; }
  ovTitle.textContent = '🏆 HALL OF FAME';
  ovText.style.display = 'none'; nameRow.style.display = 'none'; hofList.style.display = 'none';
  hofNote.style.display = 'block'; hofNote.textContent = msg || 'Loading…';
  ovBtn.textContent = (from === 'over') ? 'PLAY AGAIN' : 'PLAY';
  hofBtn.style.display = 'inline-block'; hofBtn.textContent = (from === 'over') ? 'BACK' : 'CLOSE';
  overlay.style.display = 'flex';
  const [scores] = await Promise.all([fetchTopScores(), fetchPlayCount()]);
  if (scores === null) { hofNote.textContent = hofOnline() ? 'Could not load scores — check your connection.' : 'Online scores aren\'t set up yet.'; return; }
  if (scores.length === 0) { hofNote.textContent = 'No scores yet — be the first!'; return; }
  hofNote.style.display = msg ? 'block' : 'none'; if (msg) hofNote.textContent = msg;
  hofList.innerHTML = scores.map((s, i) =>
    `<li><span class="rank">${i+1}.</span><span class="nm">${escapeHtml(s.name)}</span><span class="sc">${s.score}</span></li>`).join('');
  hofList.style.display = 'block';
  if (playCount != null) { hofNote.style.display = 'block'; hofNote.textContent = '🎮 ' + playCount.toLocaleString() + ' games played'; }
}

function startGame() {
  mode = 'play';
  overlay.style.display = 'none';
  bigBtn.style.display = 'none';
  creditEl.style.display = 'none';
  hofTitleBtn.style.display = 'none';
  reset();                       // pickTheme() also sets the theme music track
  bumpPlayCount();               // tally this game
  initAudio(); applyMute();
  startMusic();
}
ovBtn.addEventListener('click', startGame);

submitBtn.addEventListener('click', async () => {
  const nm = ((nameInput.value || '').trim().slice(0, 14)) || 'Anon';
  lastName = nm;
  submitBtn.disabled = true; submitBtn.textContent = 'SAVING…';
  const ok = await submitScore(nm, score);
  showHallOfFame('over', ok ? null : 'Could not save — check your connection.');
});

hofBtn.addEventListener('click', () => {
  if (overlayView === 'over') { showHallOfFame('over'); return; }
  // currently viewing the board -> go back
  if (hofFrom === 'over') { showGameOver(); }
  else {                                   // came from the title screen
    overlay.style.display = 'none';
    bigBtn.style.display = 'block'; creditEl.style.display = 'block';
    if (hofOnline()) hofTitleBtn.style.display = 'flex';
  }
});

hofTitleBtn.addEventListener('click', e => { e.stopPropagation(); initAudio(); applyMute(); showHallOfFame('title'); });

// ---- Main loop ----
let last = 0;
function loop(t) {
  const dt = last ? t - last : 16; last = t;
  clock = t;
  if (mode === 'play') { if (running) { update(dt); draw(); } }
  else if (mode === 'title') drawTitle();
  else if (mode === 'howto') drawHowto();
  requestAnimationFrame(loop);
}

function advanceMenu() {
  initAudio(); applyMute();
  if (mode === 'title') {
    if (audioReady && !musicOn) { currentMusic = TITLE_MUSIC; startMusic(); }
    mode = 'howto'; bigBtn.textContent = 'GO!'; creditEl.style.display = 'none'; hofTitleBtn.style.display = 'none';
  } else if (mode === 'howto') {
    startGame();
  }
}
bigBtn.addEventListener('click', e => { e.stopPropagation(); advanceMenu(); });

// unlock audio + start the jingle on the first interactions; keep trying until iOS wakes up
function audioKick() {
  initAudio(); unlockAudio(); applyMute();
  if ((mode === 'title' || mode === 'howto') && audioReady && !musicOn) { currentMusic = TITLE_MUSIC; startMusic(); }
  if (AC && AC.state === 'running') {
    ['touchend','pointerdown','mousedown','keydown'].forEach(ev => removeEventListener(ev, audioKick, true));
  }
}
['touchend','pointerdown','mousedown','keydown'].forEach(ev => addEventListener(ev, audioKick, true));

// ---- boot to the title screen ----
mode = 'title'; running = false; player = { lane:0 };
bigBtn.textContent = 'PLAY'; bigBtn.style.display = 'block';
creditEl.style.display = 'block';
if (hofOnline()) hofTitleBtn.style.display = 'flex';
overlay.style.display = 'none';
fetchPlayCount();
requestAnimationFrame(loop);
</script>
</body>
</html>
